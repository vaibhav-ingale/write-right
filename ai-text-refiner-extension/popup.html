<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Write Right</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        width: 280px;
        background: #0b0e15;
        color: #fff;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 10px;
      }

      button {
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
        background: #1f6feb;
        color: #fff;
        cursor: pointer;
        font-size: 13px;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.4;
      }

      a {
        color: #8ab4f8;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>Write Right</h1>
    <p>Press <strong>\</strong> inside a textbox to open the popup UI and refine text with a local LLM.</p>
    <label style="display:flex; align-items:center; gap:6px; margin-bottom:10px; font-size:12px;">
      <input type="checkbox" id="modifierToggle" />
      Require <strong>Ctrl</strong> / <strong>Cmd</strong> + <strong>\</strong> to open (recommended)
    </label>

    <label style="display:flex; flex-direction:column; gap:4px; font-size:12px; margin-bottom:10px;">
      <span style="font-weight:600;">Model</span>
      <select id="modelSelect" style="padding: 7px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.35); color: #fff;"></select>
      <span id="modelStatus" style="font-size:11px; opacity:0.75;">Loading available models...</span>
    </label>

    <label style="display:flex; flex-direction:column; gap:4px; font-size:12px; margin-bottom:10px;">
      <span style="font-weight:600;">Word limit (optional)</span>
      <input id="wordLimit" type="number" min="1" placeholder="e.g. 400" style="padding: 7px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.35); color: #fff;" />
      <span id="wordLimitStatus" style="font-size:11px; opacity:0.75;">Leave empty for no limit.</span>
    </label>


    <button id="check">Check backend</button>
    <div class="status" id="status"></div>
    <div style="margin-top: 14px; font-size: 11px; opacity: 0.75;">
      Backend: <code>http://localhost:8000</code><br />
      Make sure <a href="#" id="serverLink">backend</a> is running.
    </div>
    <script src="popup.js"></script>
  </body>
</html>
